<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- SEO -->
    <meta name="description" content="Zyrix FinSuite — invoices, collections, and AI cashflow analytics for businesses in Turkey, Saudi Arabia, and the wider MENA region." />
    <meta name="keywords" content="e-invoice, AI cashflow, CRM, ERP, Turkey, Saudi Arabia, KDV, ZATCA" />
    <meta name="author" content="Zyrix" />

    <!-- Theme -->
    <meta name="theme-color" content="#E30A17" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Zyrix FinSuite" />
    <meta name="application-name" content="Zyrix FinSuite" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Zyrix FinSuite" />
    <meta property="og:description" content="Invoices, collections, and AI cashflow analytics for MENA businesses." />
    <meta property="og:url" content="https://finsuite.zyrix.co" />
    <meta property="og:image" content="https://finsuite.zyrix.co/og-image.png" />

    <title>Zyrix FinSuite</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Manrope:wght@400;500;600;700;800;900&family=Inter+Tight:wght@600;700;800;900&display=swap" rel="stylesheet" />

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #fff;
        font-family: 'Plus Jakarta Sans', 'Manrope', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Cleanup any stale service workers / caches from previous PWA build -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.getRegistrations().then(rs => {
            rs.forEach(r => r.unregister());
          });
          if (window.caches) {
            caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
          }
        });
      }
    </script>
  </body>
</html>
